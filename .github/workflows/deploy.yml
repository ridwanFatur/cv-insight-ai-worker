name: Deploy

on:
  push:
    branches:
      - prod

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATEKEY }}

      - name: Add GCE VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ridwan-faturrahman
          version: 'latest'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # - name: Build Docker image
      #   run: |
      #     IMAGE_NAME=us-central1-docker.pkg.dev/ridwan-faturrahman/cvinsight-repo/worker-cvinsight-app
      #     IMAGE_TAG=${GITHUB_SHA::7}
      #     docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$IMAGE_TAG .

      # - name: Push Docker image
      #   run: |
      #     IMAGE_NAME=us-central1-docker.pkg.dev/ridwan-faturrahman/cvinsight-repo/worker-cvinsight-app
      #     IMAGE_TAG=${GITHUB_SHA::7}
      #     docker push $IMAGE_NAME:latest
      #     docker push $IMAGE_NAME:$IMAGE_TAG

      # - name: VM Pull Docker Image
      #   run: |          
      #     ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
      #       gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      #       docker pull us-central1-docker.pkg.dev/ridwan-faturrahman/cvinsight-repo/worker-cvinsight-app:latest
      #     EOF

      - name: Set Env
        run: |          
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
            gcloud secrets versions access latest --secret="CVINSIGHT_AI_BACKEND_ENV" > env.backend.prod
            gcloud secrets versions access latest --secret="CVINSIGHT_AI_DATABASE_ENV" > env.db.prod
            gcloud secrets versions access latest --secret="CVINSIGHT_AI_RABBITMQ_ENV" > env.rabbitmq.prod
            gcloud secrets versions access latest --secret="CVINSIGHT_AI_WORKER_ENV" > env.worker.prod

            set -a
            source env.db.prod
            set +a
          EOF

      - name: Docker Compose
        run: |          
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
            docker-compose stop worker-cvinsight
            docker-compose rm -f worker-cvinsight
            docker-compose up -d worker-cvinsight
          EOF

      - name: Clean
        run: |          
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
            rm -f env.backend.prod
            rm -f env.db.prod
            rm -f env.rabbitmq.prod
            rm -f env.worker.prod

            docker images -f "dangling=true" -q us-central1-docker.pkg.dev/ridwan-faturrahman/cvinsight-repo/worker-cvinsight-app | xargs -r docker rmi
          EOF